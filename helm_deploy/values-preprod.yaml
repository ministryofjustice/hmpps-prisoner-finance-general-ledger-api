---
# Per environment values which override defaults in hmpps-prisoner-finance-general-ledger-api/values.yaml

generic-service:
  replicaCount: 2

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi

  ingress:
    host: prisoner-finance-general-ledger-api-preprod.hmpps.service.justice.gov.uk

  env:
    JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
    JAVA_OPTS: ""
    DB_POOL_SIZE: "55" # t4g.small instance - 171 total connections, 2 pods (+1), 165 total connections used
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: "applicationinsights.dev.json"
    HMPPS_AUTH_URL: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
    ENV_STRING: "preprod"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: prisoner-finance-alerts-nonprod
