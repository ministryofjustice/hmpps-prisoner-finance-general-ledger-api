spring:
  jpa:
    show-sql: true

  datasource:
    url: 'jdbc:postgresql://localhost:5432/general_ledger?sslmode=prefer'
    username: postgres
    password: postgres

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

hmpps.sqs:
  provider: localstack
  queues:
    calculated_balance:
      queueName: calculated_balance_queue
      dlqName: calculated_balance_queue-dlq

hmpps-auth:
  url: "http://localhost:8090/auth"