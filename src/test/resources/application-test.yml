server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

spring:
  jpa:
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:/db/migrations/common

hmpps-auth:
  url: "http://localhost:8090/auth"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    version: 5.32.2
    enabled: true

hmpps.sqs:
  provider: localstack
  queues:
    calculated_balance:
      queueName: "calculated_balance_queue.fifo"
      dlqName: "calculated_balance_queue-dlq.fifo"
      visibilityTimeout: 600